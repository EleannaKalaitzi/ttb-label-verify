# Railway config-as-code — overrides dashboard values, versioned with the repo.
# Deploy notes:
#   - Set MOCK_EXTRACTION=1 to run without an API key (sample data), OR set
#     ANTHROPIC_API_KEY for the live model.
#   - Disable "Serverless / App Sleeping" in the service settings: a cold start
#     adds ~15–20s to the first request and would violate the 5-second budget.
#     The /api/health endpoint supports a keep-alive ping as a fallback.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
